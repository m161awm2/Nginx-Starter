name: Nginx-Starter CI

on:
  push: [push]
  pull_request:

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python 문법 검사
        run: python -m py_compile serverHelper.py

      - name: Shell 문법 검사
        run: bash -n serverInstaller.sh

      - name: Docker 이미지 빌드
        run: docker build -t nginx-starter .